<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>現場請求管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a3a5c;--navy-dark:#0f2640;--navy-light:#e8f0f8;
  --gold:#c9a84c;--gold-dark:#a88a38;
  --bg:#f5f6f8;--surface:#ffffff;--border:#e2e4e8;--border-med:#c8cace;
  --text:#1a1d23;--text-2:#5a6070;--text-3:#9aa0ae;
  --green:#1a7a4a;--green-bg:#eaf5ef;--green-bd:#b2dcc4;
  --amber:#8a5c00;--amber-bg:#fef8e8;--amber-bd:#f0d080;
  --red:#a32020;--red-bg:#fdf0f0;--red-bd:#f0b8b8;
  --blue:#1a5ca8;--blue-bg:#eaf0fb;--blue-bd:#a8c4ee;
  --radius:10px;--radius-sm:7px;--shadow:0 2px 8px rgba(0,0,0,.08);
  --font:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--navy);color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.app-name{font-size:16px;font-weight:600}
.app-sub{font-size:11px;opacity:.6;margin-top:1px}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.8}
.role-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;background:rgba(255,255,255,.2)}
.main{flex:1;padding:16px;max-width:900px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-dark)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold-dark)}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;border:1px solid}
.alert-warn{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd)}
.alert-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.alert-info{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.alert-success{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.alerts-area{display:flex;flex-direction:column;gap:8px}
.tab-bar{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tab-btn{flex:1;padding:11px 0;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:var(--text-2);transition:all .15s;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;border-right:1px solid var(--border)}
.tab-btn:last-child{border-right:none}
.tab-btn.active{background:var(--navy);color:#fff}
.tab-btn .tab-count{font-size:11px;padding:1px 7px;border-radius:20px;font-weight:700}
.tab-btn.active .tab-count{background:rgba(255,255,255,.2);color:#fff}
.tab-btn:not(.active) .tab-count{background:var(--bg);color:var(--text-2)}
.tab-btn.tab-done:not(.active) .tab-count{background:var(--green-bg);color:var(--green)}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow)}
.sum-lbl{font-size:11px;color:var(--text-3);margin-bottom:4px}
.sum-val{font-size:20px;font-weight:700}
.sum-sub{font-size:11px;color:var(--text-2);margin-top:2px}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.card-alert{border-color:var(--amber-bd);border-width:1.5px}
.card-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .15s}
.card-header:hover{background:#fafbfc}
.card-icon{width:38px;height:38px;background:var(--navy);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-icon-warn{background:#7a4500}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:12px;color:var(--text-2);margin-top:2px}
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.chevron{font-size:18px;color:var(--text-3);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-active{background:var(--green-bg);color:var(--green)}
.badge-warn{background:var(--amber-bg);color:var(--amber)}
.badge-done{background:#f0f1f3;color:var(--text-2)}
.card-body{border-top:1px solid var(--border);padding:16px}
.section-label{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.info-item .lbl{font-size:11px;color:var(--text-3);margin-bottom:2px}
.info-item .val{font-size:13px;font-weight:500}
.progress-wrap{margin-bottom:16px}
.progress-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--navy),#2a6cb8);border-radius:3px}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-top:4px}
.divider{height:1px;background:var(--border);margin:14px 0}
/* 契約サマリー */
.contract-summary{background:var(--navy-light);border:1px solid var(--blue-bd);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px}
.contract-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.contract-row.total{border-top:1px solid var(--blue-bd);margin-top:6px;padding-top:8px;font-weight:700;font-size:14px;color:var(--navy)}
.contract-label{color:var(--text-2)}
.contract-amount{font-weight:600;font-variant-numeric:tabular-nums}
.add-contract-tag{font-size:10px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);padding:1px 6px;border-radius:4px;margin-left:6px}
/* 請求テーブル */
.billing-wrap{overflow-x:auto;margin-bottom:12px}
table{width:100%;border-collapse:collapse;min-width:500px}
thead th{text-align:left;padding:8px 10px;font-size:11px;font-weight:700;color:var(--text-3);border-bottom:1px solid var(--border);background:#fafbfc;text-transform:uppercase;letter-spacing:.05em}
tbody td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.row-overdue{background:var(--red-bg)}
tbody tr.row-upcoming{background:var(--amber-bg)}
tbody tr.row-additional{background:#fffbf0}
.billing-label{font-weight:500;font-size:13px}
.billing-note{font-size:11px;color:var(--text-2);margin-top:2px}
.date-log{font-size:10px;color:var(--text-3);margin-top:2px}
.amount-cell{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.status-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;border:1px solid}
.chip-pending{background:#f0f1f3;color:var(--text-2);border-color:var(--border-med)}
.chip-issued{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.chip-paid{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.chip-overdue{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.doc-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.doc-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);background:var(--bg)}
.doc-type-pill{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.pill-original{background:var(--blue-bg);color:var(--blue)}
.pill-change{background:var(--amber-bg);color:var(--amber)}
/* モーダル */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:600px){.modal{border-radius:var(--radius);max-width:560px;max-height:88vh}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-2);font-family:var(--font)}
.modal-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
/* フォーム */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--text-2)}
.field input,.field select,.field textarea{border:1px solid var(--border-med);border-radius:var(--radius-sm);padding:9px 11px;font-size:14px;background:var(--surface);color:var(--text);font-family:var(--font);width:100%}
.field input:focus,.field select:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 2px rgba(26,58,92,.12)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.upload-zone{border:2px dashed var(--border-med);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.upload-zone:hover,.upload-zone.dragging{border-color:var(--navy);background:var(--navy-light)}
.upload-zone .uz-icon{font-size:32px;margin-bottom:8px}
.upload-zone p{font-size:13px;color:var(--text-2)}
.ai-box{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius-sm);font-size:13px}
.ai-analyzing{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.ai-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.ai-error{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.spinner{width:16px;height:16px;border:2px solid rgba(26,92,168,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* ログイン画面 */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a3a5c 0%,#0f2640 100%)}
.login-card{background:#fff;border-radius:20px;padding:40px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px}
.login-sub{font-size:13px;color:var(--text-2);margin-bottom:32px;line-height:1.6}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px;border:1px solid var(--border-med);border-radius:var(--radius-sm);background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);color:var(--text)}
.btn-google:hover{background:var(--bg);border-color:var(--navy)}
.google-icon{width:20px;height:20px}
/* 承認待ち */
.pending-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
.pending-card{background:#fff;border-radius:16px;padding:32px;max-width:400px;width:100%;text-align:center;box-shadow:var(--shadow)}
/* ユーザー管理 */
.user-table{width:100%;border-collapse:collapse;font-size:13px}
.user-table th{text-align:left;padding:8px 10px;font-size:11px;font-weight:700;color:var(--text-3);border-bottom:1px solid var(--border);background:#fafbfc}
.user-table td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
.role-select{border:1px solid var(--border-med);border-radius:6px;padding:4px 8px;font-size:12px;font-family:var(--font);background:#fff}
/* ローディング */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;color:var(--text-2)}
.big-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-2)}
.empty-state .es-icon{font-size:52px;margin-bottom:14px;opacity:.4}
.sync-indicator{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4caf50}
.sync-dot.syncing{background:#ff9800;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* CSV */
.csv-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:11px;max-height:200px;overflow-y:auto}
</style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div class="big-spinner"></div>
  <div>読み込み中...</div>
</div>

<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">🏗️</div>
    <h1 class="login-title">現場請求管理</h1>
    <p class="login-sub">スナダ建設株式会社<br>社内向け請求管理システム</p>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleアカウントでログイン
    </button>
  </div>
</div>

<div id="pending-screen" class="pending-screen" style="display:none">
  <div class="pending-card">
    <div style="font-size:48px;margin-bottom:16px">⏳</div>
    <h2 style="font-size:18px;font-weight:700;margin-bottom:8px">承認待ち</h2>
    <p style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:20px">システム管理者があなたのアカウントに権限を付与するまでお待ちください。</p>
    <p id="pending-email" style="font-size:12px;color:var(--text-3);margin-bottom:20px"></p>
    <button class="btn btn-ghost btn-sm" onclick="logout()">ログアウト</button>
  </div>
</div>

<div id="main-app" class="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">🏗️</div>
      <div>
        <div class="app-name">現場請求管理</div>
        <div class="app-sub" id="site-count-label">読み込み中...</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">同期済</span></div>
      <div class="user-info">
        <span id="user-name-label"></span>
        <span class="role-badge" id="role-badge-label"></span>
      </div>
      <div id="topbar-btns" style="display:flex;gap:6px"></div>
    </div>
  </div>
  <div class="main" id="main-content-area"></div>
</div>

<div class="overlay" id="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal"><div class="modal-head"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-body"></div><div class="modal-foot" id="modal-foot"></div></div>
</div>

<script>
// ─── CONFIG ───
const SB_URL = 'https://mvzjypvvzwoxdntjxlxt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12emp5cHZ2endveGRudGp4bHh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzM1ODIsImV4cCI6MjA5NzgwOTU4Mn0.OAo802jvm1kpqvJS32O1hKRefazNRA8sLcvDx9RY4qA';
const ANTHROPIC_KEY_STORAGE = 'kenba_anthropic_key';

const sb = supabase.createClient(SB_URL, SB_KEY);
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

// ─── STATE ───
let currentUser = null;
let currentProfile = null;
let sites = [];
let openSiteId = null;
let currentTab = 'active';

// ─── ROLE HELPERS ───
const ROLES = {
  sales:    { label:'営業',         canCreateSite:true,  canDeleteSite:false, canDeleteBilling:false, canIssue:true,  canPaid:false, canUndo:true },
  finance:  { label:'財務管理室',   canCreateSite:false, canDeleteSite:false, canDeleteBilling:false, canIssue:false, canPaid:true,  canUndo:true },
  admin:    { label:'システム管理者',canCreateSite:true,  canDeleteSite:true,  canDeleteBilling:true,  canIssue:true,  canPaid:true,  canUndo:true },
  pending:  { label:'承認待ち',     canCreateSite:false, canDeleteSite:false, canDeleteBilling:false, canIssue:false, canPaid:false, canUndo:false },
};
function can(action){ return currentProfile && ROLES[currentProfile.role]?.[action]; }
function roleName(r){ return ROLES[r]?.label || r; }

// ─── SYNC UI ───
function setSyncing(){ document.getElementById('sync-dot').className='sync-dot syncing'; document.getElementById('sync-label').textContent='同期中...'; }
function setSynced(){ document.getElementById('sync-dot').className='sync-dot'; document.getElementById('sync-label').textContent='同期済'; }
function setSyncError(){ document.getElementById('sync-dot').style.background='#e53935'; document.getElementById('sync-label').textContent='同期エラー'; }

// ─── AUTH ───
async function loginWithGoogle(){
  await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: window.location.href }
  });
}
async function logout(){
  await sb.auth.signOut();
  location.reload();
}

// ─── DB ───
async function loadFromDB(){
  const [s1,s2,s3,s4] = await Promise.all([
    sb.from('sites').select('*'),
    sb.from('billings').select('*'),
    sb.from('docs').select('*'),
    sb.from('additional_contracts').select('*'),
  ]);
  if(s1.error) throw s1.error;
  sites = s1.data.map(s=>({
    id:s.id, siteNo:s.site_no||'', client:s.client||'', name:s.name||'',
    address:s.address||'', structure:s.structure||'',
    start:s.start_date||'', completion:s.completion_date||'',
    handover:s.handover_date||'', totalAmount:s.total_amount||0,
    baseAmount:s.base_amount||s.total_amount||0,

    })),

    })),

      id:a.id,title:a.title||'',amount:a.amount||0,date:a.date||'',notes:a.notes||''
    }))

// ─── HELPERS ───
function daysBetween(a,b){const da=new Date(a);da.setHours(0,0,0,0);const db=new Date(b);db.setHours(0,0,0,0);return Math.round((db-da)/(1000*60*60*24));}
function fmtDate(d){if(!d)return '—';const dt=typeof d==='string'?new Date(d):d;return dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日';}
function fmtMoney(n){if(!n&&n!==0)return '—';return '¥'+Number(n).toLocaleString('ja-JP');}
function uid(){return crypto.randomUUID?crypto.randomUUID():'_'+Math.random().toString(36).substr(2,12);}
function calcProgress(s){const start=new Date(s.start),end=new Date(s.completion);return Math.min(100,Math.max(0,Math.round((TODAY-start)/(end-start)*100)));}
function isCompleted(s){return s.billings.length>0&&s.billings.every(b=>b.paidDate);}
function calcTotalAmount(s){return (s.baseAmount||0)+(s.additionalContracts||[]).reduce((a,c)=>a+c.amount,0);}
function sortedSites(list){return [...list].sort((a,b)=>{const na=a.siteNo?a.siteNo.replace(/[^0-9]/g,''):'';const nb=b.siteNo?b.siteNo.replace(/[^0-9]/g,''):'';if(na&&nb)return parseInt(na)-parseInt(nb);if(na)return -1;if(nb)return 1;return a.name.localeCompare(b.name,'ja');});}
function getAnthropicKey(){return localStorage.getItem(ANTHROPIC_KEY_STORAGE)||'';}

// ─── ALERTS ───
function getAlerts(){
  const out=[];
  sites.forEach(s=>{
    const handover=new Date(s.handover||s.completion);
    const warnAt=new Date(handover);warnAt.setDate(warnAt.getDate()-14);
    if(TODAY>=warnAt&&TODAY<=handover)
      out.push({siteId:s.id,type:'handover',msg:`「${s.name}」引渡まであと${daysBetween(TODAY,handover)}日 — 最終請求書を確認してください`});
    s.billings.forEach(b=>{
      if(b.issuedDate&&!b.paidDate){
        const issued=new Date(b.issuedDate);const warnAt2=new Date(issued);warnAt2.setDate(warnAt2.getDate()+30);
        if(TODAY>=warnAt2) out.push({siteId:s.id,type:'unpaid',msg:`「${s.name}」${b.label} — 請求書発行から${daysBetween(issued,TODAY)}日経過しても入金がありません`});
      }
      if(b.issuedDate)return;
      const due=new Date(b.dueDate);
      if(TODAY>due) out.push({siteId:s.id,type:'overdue',msg:`「${s.name}」${b.label} の請求期限が超過しています`});
      else{const warn=new Date(due);warn.setDate(warn.getDate()-14);if(TODAY>=warn) out.push({siteId:s.id,type:'warn',msg:`「${s.name}」${b.label} の請求期限まであと${daysBetween(TODAY,due)}日`});}
    });
  });
  return out;
}

// ─── RENDER ───
function switchTab(t){currentTab=t;openSiteId=null;render();}
function toggleSite(id){openSiteId=openSiteId===id?null:id;render();}

function render(){
  const area=document.getElementById('main-content-area');
  const alerts=getAlerts();
  const activeSites=sites.filter(s=>!isCompleted(s));
  const doneSites=sites.filter(s=>isCompleted(s));
  const displaySites=currentTab==='active'?activeSites:currentTab==='done'?doneSites:null;
  const pending=activeSites.reduce((a,s)=>a+s.billings.filter(b=>!b.issuedDate).length,0);
  const unpaid=activeSites.reduce((a,s)=>a+s.billings.filter(b=>b.issuedDate&&!b.paidDate).length,0);
  document.getElementById('site-count-label').textContent=sites.length+'件の現場を管理中';

  // topbar buttons
  const btns=document.getElementById('topbar-btns');
  let bhtml='';
  if(can('canCreateSite')) bhtml+=`<button class="btn btn-navy btn-sm" onclick="openAddModal()">＋ 現場を追加</button>`;
  bhtml+=`<button class="btn btn-ghost btn-sm" onclick="openCsvModal()">📂 CSV取込</button>`;
  if(can('canDeleteSite')) bhtml+=`<button class="btn btn-ghost btn-sm" onclick="openUserMgmt()">👥 ユーザー管理</button>`;
  bhtml+=`<button class="btn btn-ghost btn-sm" onclick="logout()">ログアウト</button>`;
  btns.innerHTML=bhtml;

  let html='';
  // タブ
  html+=`<div class="tab-bar">
    <button class="tab-btn${currentTab==='active'?' active':''}" onclick="switchTab('active')">🏗️ 施工中<span class="tab-count">${activeSites.length}</span></button>
    <button class="tab-btn tab-done${currentTab==='done'?' active':''}" onclick="switchTab('done')">✅ 完了<span class="tab-count">${doneSites.length}</span></button>
    ${can('canDeleteSite')?`<button class="tab-btn${currentTab==='users'?' active':''}" onclick="switchTab('users')">👥 ユーザー</button>`:''}
  </div>`;

  if(currentTab==='users'){ html+=renderUserTab(); area.innerHTML=html; return; }

  if(currentTab==='active'&&activeSites.length>0){
    html+=`<div class="summary-bar">
      <div class="sum-card"><div class="sum-lbl">施工中現場</div><div class="sum-val" style="color:var(--navy)">${activeSites.length}</div><div class="sum-sub">件</div></div>
      <div class="sum-card"><div class="sum-lbl">未請求</div><div class="sum-val" style="color:${pending?'var(--amber)':'var(--green)'}">${pending}</div><div class="sum-sub">件</div></div>
      <div class="sum-card"><div class="sum-lbl">入金待ち</div><div class="sum-val" style="color:${unpaid?'var(--blue)':'var(--green)'}">${unpaid}</div><div class="sum-sub">件</div></div>
    </div>`;
  }
  if(currentTab==='active'&&alerts.length){
    html+='<div class="alerts-area">';
    alerts.forEach(a=>{
      const cls=(a.type==='overdue'||a.type==='unpaid')?'alert-danger':'alert-warn';
      const ico=a.type==='overdue'?'🔴':a.type==='unpaid'?'💴':'🔔';
      html+=`<div class="alert ${cls}"><span style="font-size:18px;flex-shrink:0">${ico}</span><span>${a.msg}</span></div>`;
    });
    html+='</div>';
  }
  if(!displaySites.length){
    html+=`<div class="empty-state"><div class="es-icon">${currentTab==='active'?'🏗️':'✅'}</div><p>${currentTab==='active'?'施工中の現場はありません':'完了した現場はありません'}</p></div>`;
  } else {
    sortedSites(displaySites).forEach(s=>{ html+=renderSiteCard(s,alerts); });
  }
  area.innerHTML=html;
}

    body=`<div class="card-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="section-label" style="margin-bottom:0">📋 基本情報</div>
        ${can('canCreateSite')?`<button class="btn btn-ghost btn-sm" onclick="openEditSite('${s.id}')">✏️ 編集</button>`:''}
      </div>
      <div class="info-grid">
        <div class="info-item"><div class="lbl">現場番号</div><div class="val">${s.siteNo||'—'}</div></div>
        <div class="info-item"><div class="lbl">発注者名</div><div class="val" style="font-size:12px">${s.client||'—'}</div></div>
        <div class="info-item"><div class="lbl">工事場所</div><div class="val" style="font-size:12px">${s.address||'—'}</div></div>
        <div class="info-item"><div class="lbl">構造・規模</div><div class="val" style="font-size:12px">${s.structure||'—'}</div></div>
        <div class="info-item"><div class="lbl">着工</div><div class="val">${fmtDate(s.start)}</div></div>
        <div class="info-item"><div class="lbl">竣工予定</div><div class="val">${fmtDate(s.completion)}</div></div>
        <div class="info-item"><div class="lbl">引渡予定</div><div class="val" style="color:var(--navy);font-weight:700">${fmtDate(s.handover)}</div></div>
      </div>
      ${contractHtml}
      <div style="display:flex;gap:8px;margin-bottom:14px">
        ${can('canCreateSite')?`<button class="btn btn-ghost btn-sm" onclick="openAddAdditionalContract('${s.id}')">＋ 追加契約を追加</button>`:''}
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-meta"><span>${fmtDate(s.start)}</span><span>${pct}%</span><span>${fmtDate(s.completion)}</span></div>
      </div>

      <div class="billing-wrap">
        <table>
          <thead><tr><th>請求項目</th><th>種別</th><th>期限日</th><th>金額</th><th>ステータス</th><th></th></tr></thead>

function renderBillingRow(siteId,b){
  const due=new Date(b.dueDate);
  const isOverdue=!b.issuedDate&&TODAY>due;
  const isUpcoming=!b.issuedDate&&!isOverdue&&daysBetween(TODAY,due)<=14;
  const rowCls=isOverdue?'row-overdue':isUpcoming?'row-upcoming':b.isAdditional?'row-additional':'';
  const kindTag=b.isAdditional?'<span class="add-contract-tag">追加</span>':'<span style="font-size:10px;color:var(--text-3)">当初</span>';
  let statusHtml='';
  if(b.paidDate){
    statusHtml=`<div class="status-actions"><span class="chip chip-paid">✓ 入金済</span><div class="date-log">${fmtDate(b.paidDate)}</div>${can('canUndo')?`<button class="btn btn-ghost btn-xs" onclick="unmarkPaid('${siteId}','${b.id}')">↩ 取消</button>`:''}</div>`;
  } else if(b.issuedDate){
    statusHtml=`<div class="status-actions"><span class="chip chip-issued">📤 発行済</span><div class="date-log">${fmtDate(b.issuedDate)}</div>${can('canPaid')?`<button class="btn btn-success btn-xs" onclick="markPaid('${siteId}','${b.id}')">入金確認</button>`:''} ${can('canUndo')?`<button class="btn btn-ghost btn-xs" onclick="unmarkIssued('${siteId}','${b.id}')">↩ 取消</button>`:''}</div>`;
  } else {
    const chip=isOverdue?`<span class="chip chip-overdue">⚠ 期限超過</span>`:`<span class="chip chip-pending">未発行</span>`;
    statusHtml=`<div class="status-actions">${chip}${can('canIssue')?`<button class="btn btn-navy btn-xs" onclick="markIssued('${siteId}','${b.id}')">発行済にする</button>`:''}</div>`;
  }
  return `<tr class="${rowCls}"><td><div class="billing-label">${b.label}</div><div class="billing-note">${b.note||''}</div></td><td>${kindTag}</td><td style="white-space:nowrap;font-size:13px">${fmtDate(b.dueDate)}</td><td class="amount-cell">${fmtMoney(b.amount)}</td><td>${statusHtml}</td><td>${can('canDeleteBilling')?`<button class="btn btn-ghost btn-xs" onclick="rmBilling('${siteId}','${b.id}')">✕</button>`:''}</td></tr>`;
}

// ─── ACTIONS ───
async function markIssued(siteId,bId){
  const s=sites.find(x=>x.id===siteId),b=s.billings.find(x=>x.id===bId);
  b.issuedDate=new Date().toISOString().split('T')[0]; render(); await saveBillingDB(siteId,b);
}
async function markPaid(siteId,bId){
  const s=sites.find(x=>x.id===siteId),b=s.billings.find(x=>x.id===bId);
  b.paidDate=new Date().toISOString().split('T')[0]; render(); await saveBillingDB(siteId,b);
}
async function unmarkIssued(siteId,bId){
  if(!confirm('発行済を取り消しますか？'))return;
  const s=sites.find(x=>x.id===siteId),b=s.billings.find(x=>x.id===bId);
  b.issuedDate=null; render(); await saveBillingDB(siteId,b);
}
async function unmarkPaid(siteId,bId){
  if(!confirm('入金済を取り消しますか？'))return;
  const s=sites.find(x=>x.id===siteId),b=s.billings.find(x=>x.id===bId);
  b.paidDate=null; render(); await saveBillingDB(siteId,b);
}
async function rmBilling(siteId,bId){
  if(!confirm('この請求項目を削除しますか？'))return;
  const s=sites.find(x=>x.id===siteId); s.billings=s.billings.filter(b=>b.id!==bId);
  render(); await deleteDB('billings',bId);
}
async function rmDoc(siteId,dId){
  if(!confirm('この書類を削除しますか？'))return;
  const s=sites.find(x=>x.id===siteId); s.docs=s.docs.filter(d=>d.id!==dId);
  render(); await deleteDB('docs',dId);
}
async function rmSite(id){
  if(!confirm('この現場を削除しますか？'))return;
  sites=sites.filter(s=>s.id!==id); if(openSiteId===id)openSiteId=null;
  render(); await deleteDB('sites',id);
}

function addBillingRow(cid,label='',dueDate='',amount='',isAdditional=false){
  const id=uid();const row=document.createElement('div');
  row.id=id;row.style.cssText='display:grid;grid-template-columns:1.8fr 1.1fr 1.2fr auto;gap:6px;align-items:end;margin-bottom:8px';

function handleMainDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)handleMainFile(f);}
async function handleMainFile(file){
  if(!file||file.type!=='application/pdf'){alert('PDFを選択してください');return;}
  const akey=getAnthropicKey();
  if(!akey){
    document.getElementById('ai-status-main').innerHTML=`<div class="ai-box ai-error">⚠ AnthropicのAPIキーが設定されていません。<button class="btn btn-ghost btn-xs" onclick="promptAnthropicKey()">設定する</button></div>`;
    return;
  }
  document.getElementById('ai-status-main').innerHTML=`<div class="ai-box ai-analyzing"><div class="spinner"></div>AIがPDFを解析中...</div>`;
  try{
    const b64=await toBase64(file);
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':akey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-calls':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:`この工事請負契約書PDFから以下の情報をJSONのみで返してください。コードブロック不要。{"name":"工事名","address":"工事場所","structure":"構造規模","start":"YYYY-MM-DD","completion":"YYYY-MM-DD","handover":"YYYY-MM-DD","totalAmount":税込合計数値,"billings":[{"label":"請求名","dueDate":"YYYY-MM-DD","amount":税込金額数値,"note":"備考"}]}`}]}]})});
    if(!res.ok)throw new Error('API Error: '+res.status);
    const data=await res.json();
    const r=JSON.parse(data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim());
    if(r.name)document.getElementById('fn-name').value=r.name;
    if(r.address)document.getElementById('fn-addr').value=r.address;
    if(r.structure)document.getElementById('fn-struct').value=r.structure;
    if(r.start)document.getElementById('fn-start').value=r.start;
    if(r.completion)document.getElementById('fn-completion').value=r.completion;
    if(r.handover)document.getElementById('fn-handover').value=r.handover;
    if(r.totalAmount)document.getElementById('fn-amount').value=r.totalAmount;
    document.getElementById('billing-rows-main').innerHTML='';
    if(r.billings?.length)r.billings.forEach(b=>addBillingRow('billing-rows-main',b.label||'',b.dueDate||'',b.amount||''));
    document.getElementById('ai-status-main').innerHTML=`<div class="ai-box ai-done">✅ 解析完了 — 内容を確認して保存してください</div>`;
  }catch(err){document.getElementById('ai-status-main').innerHTML=`<div class="ai-box ai-error">⚠ 解析失敗: ${err.message}</div>`;}
}

function promptAnthropicKey(){
  const k=prompt('AnthropicのAPIキー（sk-ant-...）を入力してください');
  if(k){localStorage.setItem(ANTHROPIC_KEY_STORAGE,k);alert('保存しました。再度PDFをアップロードしてください。');}
}

async function saveNewSite(){
  const name=document.getElementById('fn-name').value.trim();
  if(!name){alert('工事名を入力してください');return;}
  const rows=document.querySelectorAll('#billing-rows-main > div');
  const billings=[];
  rows.forEach(row=>{const ins=row.querySelectorAll('input');if(ins[0]?.value)billings.push({id:uid(),label:ins[0].value,dueDate:ins[1]?.value||'',amount:parseInt(ins[2]?.value||'0'),note:'',issuedDate:null,paidDate:null,isAdditional:false});});
  const amt=parseInt(document.getElementById('fn-amount').value||'0');
  const s={id:uid(),siteNo:document.getElementById('fn-siteno').value.trim(),client:document.getElementById('fn-client').value.trim(),name,address:document.getElementById('fn-addr').value,structure:document.getElementById('fn-struct').value,start:document.getElementById('fn-start').value,completion:document.getElementById('fn-completion').value,handover:document.getElementById('fn-handover').value,totalAmount:amt,baseAmount:amt,docs:[],billings,additionalContracts:[]};
  sites.push(s);openSiteId=s.id;closeModal();render();
  try{await saveSiteDB(s);for(const b of billings)await saveBillingDB(s.id,b);}catch(e){alert('保存失敗: '+e.message);}
}

function openCsvModal(){
  setModal('CSV一括取込',`
    <div class="alert alert-info"><span style="font-size:18px">📋</span><span>CSVファイルから現場情報を一括登録できます。</span></div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:12px;margin-bottom:4px">
      <div style="font-weight:600;margin-bottom:6px">CSVフォーマット（1行目はヘッダー）</div>
      <code style="font-size:11px;color:var(--text-2)">現場番号,発注者名,工事名,工事場所,構造規模,着工日(YYYY-MM-DD),竣工予定日,引渡予定日,請負代金</code>
    </div>
    <label class="btn btn-ghost" style="cursor:pointer;justify-content:center">📂 CSVファイルを選択<input type="file" accept=".csv" style="display:none" onchange="handleCsv(this.files[0])"></label>
    <div id="csv-preview"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">キャンセル</button><button class="btn btn-navy" id="csv-import-btn" style="display:none" onclick="importCsvData()">一括登録</button>`);
  openModal();
}

let csvParsed=[];
async function handleCsv(file){
  if(!file)return;
  const text=await file.text();
  const lines=text.split('\n').filter(l=>l.trim());
  const headers=lines[0].split(',').map(h=>h.trim());
  csvParsed=lines.slice(1).map(line=>{
    const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
    return {siteNo:vals[0]||'',client:vals[1]||'',name:vals[2]||'',address:vals[3]||'',structure:vals[4]||'',start:vals[5]||'',completion:vals[6]||'',handover:vals[7]||'',totalAmount:parseInt(vals[8]||'0')};
  }).filter(r=>r.name);
  let html=`<div class="csv-preview"><table style="width:100%;font-size:11px;border-collapse:collapse"><thead><tr>${['現場番号','発注者','工事名','着工','引渡','金額'].map(h=>`<th style="padding:4px;border-bottom:1px solid var(--border);text-align:left">${h}</th>`).join('')}</tr></thead><tbody>`;
  csvParsed.forEach(r=>{html+=`<tr>${[r.siteNo,r.client,r.name,r.start,r.handover,fmtMoney(r.totalAmount)].map(v=>`<td style="padding:4px;border-bottom:1px solid var(--border)">${v}</td>`).join('')}</tr>`;});
  html+=`</tbody></table></div><div style="font-size:12px;color:var(--text-2);margin-top:6px">${csvParsed.length}件を検出しました</div>`;
  document.getElementById('csv-preview').innerHTML=html;
  document.getElementById('csv-import-btn').style.display='inline-flex';
}
async function importCsvData(){
  if(!csvParsed.length)return;
  const btn=document.getElementById('csv-import-btn');btn.disabled=true;btn.textContent='登録中...';
  let count=0;
  for(const r of csvParsed){
    const s={id:uid(),...r,baseAmount:r.totalAmount,docs:[],billings:[],additionalContracts:[]};
    sites.push(s);
    try{await saveSiteDB(s);count++;}catch(e){console.error(e);}
  }
  closeModal();render();alert(`${count}件の現場を登録しました`);
}

// ─── UTIL ───
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

// ─── BOOT ───
async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    return;
  }
  currentUser=session.user;
  const {data:profile}=await sb.from('user_profiles').select('*').eq('id',currentUser.id).single();
  currentProfile=profile;
  if(!profile||profile.role==='pending'){
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('pending-screen').style.display='flex';
    document.getElementById('pending-email').textContent=currentUser.email;
    return;
  }
  document.getElementById('user-name-label').textContent=profile.name||currentUser.email;
  document.getElementById('role-badge-label').textContent=roleName(profile.role);
  try{
    await loadFromDB();
    subscribeRealtime();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('main-app').style.display='flex';
    render();
  }catch(e){
    document.getElementById('loading-screen').innerHTML=`<div style="color:var(--red);text-align:center;padding:20px"><p style="font-size:18px;margin-bottom:8px">⚠ 接続エラー</p><p style="font-size:13px;margin-bottom:16px">${e.message}</p><button class="btn btn-navy" onclick="location.reload()">再読込</button></div>`;
  }
  sb.auth.onAuthStateChange((event,session)=>{if(event==='SIGNED_OUT')location.reload();});
}
boot();
